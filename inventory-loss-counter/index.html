<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Loss Counter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* iPhone-ratio frame: 9:19.5 (393x852) */
  .phone-frame {
    width: 393px;
    height: 852px;
    max-height: 95vh;
    max-width: calc(95vh * (393 / 852));
    position: relative;
    overflow: hidden;
    border-radius: 48px;
    background: #000;
    box-shadow:
      0 0 0 2px rgba(255, 255, 255, 0.08),
      0 40px 80px rgba(0, 0, 0, 0.6),
      0 0 120px rgba(0, 0, 0, 0.4);
  }

  /* Background video */
  .bg-video {
    position: absolute;
    inset: 0;
    z-index: 0;
    object-fit: cover;
    width: 100%;
    height: 100%;
  }

  /* Gradient overlay — heavier at bottom for text */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: rgba(0, 0, 0, 0.6);
  }

  /* Content layout */
  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
    padding: 40px 24px 48px;
    color: #fff;
  }

  /* Top section — counter */
  .counter-section {
    width: 100%;
  }

  /* Bottom section — pinned to bottom */
  .bottom-section {
    position: absolute;
    bottom: 48px;
    left: 24px;
    right: 24px;
  }

  .label-top {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  .counter-dollar {
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    text-align: left;
    color: #fff;
    transition: font-size 1s ease-out;
  }

  .counter {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    line-height: 1.05;
    text-align: left;
    width: 100%;
    transition: font-size 1s ease-out;
  }

  .counter .dollar {
    font-weight: 500;
    opacity: 0.7;
    font-size: 0.45em;
    vertical-align: top;
    position: relative;
    top: 0.18em;
    margin-right: 2px;
  }

  .label-bottom {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 16px;
  }

  /* Bottom section — tagline */
  .tagline-section {
    width: 100%;
    padding-bottom: 12px;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: rgba(255, 255, 255, 0.15);
    margin: 0 0 24px;
  }

  .stat-line {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.85);
    text-align: left;
    margin-bottom: 16px;
  }

  .stat-line strong {
    font-weight: 700;
    color: #fff;
  }

  .fix-line {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    text-align: left;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="content">
    <div class="counter-section">
      <div class="counter-dollar" id="dollarSign">$</div>
      <div class="counter" id="counter"><span id="number">0</span></div>
    </div>

    <div class="bottom-section">
      <div class="label-top">Lost to the logistics data gap</div>
      <div class="label-bottom">since Modex started</div>
      <div class="divider"></div>
      <div class="fix-line">We're fixing that.</div>
    </div>
  </div>
</div>

<script>
  const numberEl = document.getElementById('number');
  const counterEl = document.getElementById('counter');
  const dollarEl = document.getElementById('dollarSign');
  const startTime = Date.now();

  function getFontSize(value) {
    if (value <= 0) return 100;
    const logVal = Math.log10(value);
    const minLog = 3;
    const maxLog = 12;
    const maxSize = 100;
    const minSize = 38;

    if (logVal <= minLog) return maxSize;
    if (logVal >= maxLog) return minSize;

    const t = (logVal - minLog) / (maxLog - minLog);
    return Math.round(maxSize - t * (maxSize - minSize));
  }

  let currentValue = 0;
  let intervalId = null;

  function getTickConfig() {
    if (currentValue >= 10000) {
      return { increment: 10, ms: 100 };
    }
    return { increment: 1, ms: 30 };
  }

  let currentMs = 30;

  function update() {
    const config = getTickConfig();
    currentValue += config.increment;
    const formatted = currentValue.toLocaleString('en-US');

    numberEl.innerHTML = formatted.replace(/,/g, ',<wbr>');

    const size = getFontSize(currentValue);
    counterEl.style.fontSize = size + 'px';
    dollarEl.style.fontSize = size + 'px';

    // Switch interval speed if needed
    if (config.ms !== currentMs) {
      currentMs = config.ms;
      clearInterval(intervalId);
      intervalId = setInterval(update, currentMs);
    }
  }

  numberEl.textContent = '0';
  intervalId = setInterval(update, currentMs);
</script>

</body>
</html>
